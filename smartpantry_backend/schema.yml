          description: ''
  /api/donations/{id}/:
    get:
      operationId: donations_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this donation.
        required: true
      tags:
      - donations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donation'
          description: ''
    put:
      operationId: donations_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this donation.
        required: true
      tags:
      - donations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DonationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DonationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DonationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donation'
          description: ''
    patch:
      operationId: donations_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this donation.
        required: true
      tags:
      - donations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDonationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDonationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDonationRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donation'
          description: ''
    delete:
      operationId: donations_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this donation.
        required: true
      tags:
      - donations
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/donations/{id}/claim/:
    post:
      operationId: donations_claim_create
