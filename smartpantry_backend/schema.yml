components:
  schemas:
    CategoryEnum:
      enum:
      - vegetables
      - fruits
      - dairy
      - meat
      - grains
      - beverages
      - snacks
      - others
      type: string
      description: |-
        * `vegetables` - Vegetables
        * `fruits` - Fruits
        * `dairy` - Dairy
        * `meat` - Meat
        * `grains` - Grains
        * `beverages` - Beverages
        * `snacks` - Snacks
        * `others` - Others
    Donation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        donor_email:
          type: string
          format: email
          readOnly: true
        food_item:
          type: integer
        food_item_name:
          type: string
          readOnly: true
        description:
          type: string
        pickup_info:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - donor_email
      - food_item
      - food_item_name
      - id
      - pickup_info
      - status
    DonationRequest:
      type: object
      properties:
        food_item:
          type: integer
        description:
          type: string
        pickup_info:
          type: string
          minLength: 1
      required:
      - food_item
      - pickup_info
    FoodItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          maxLength: 50
        category:
          $ref: '#/components/schemas/CategoryEnum'
        storage_location:
          $ref: '#/components/schemas/StorageLocationEnum'
        expiry_date:
          type: string
          format: date
        notes:
          type: string
        is_donated:
          type: boolean
          readOnly: true
        date_added:
          type: string
          format: date-time
          readOnly: true
        is_expiring_soon:
          type: string
          readOnly: true
      required:
      - date_added
      - expiry_date
      - id
      - is_donated
      - is_expiring_soon
      - name
      - quantity
    FoodItemRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          minLength: 1
          maxLength: 50
        category:
          $ref: '#/components/schemas/CategoryEnum'
        storage_location:
          $ref: '#/components/schemas/StorageLocationEnum'
        expiry_date:
          type: string
          format: date
        notes:
          type: string
      required:
      - expiry_date
      - name
      - quantity
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - email
      - password
    LoginResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          type: object
          additionalProperties: {}
      required:
      - access
      - refresh
      - user
    MealPlan:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
        meal_type:
          $ref: '#/components/schemas/MealTypeEnum'
        meal_name:
          type: string
          maxLength: 255
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - id
      - meal_name
    MealPlanRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        meal_type:
          $ref: '#/components/schemas/MealTypeEnum'
        meal_name:
          type: string
          minLength: 1
          maxLength: 255
        notes:
          type: string
      required:
      - date
      - meal_name
    MealTypeEnum:
      enum:
      - breakfast
      - lunch
      - dinner
      - snack
      type: string
      description: |-
        * `breakfast` - Breakfast
        * `lunch` - Lunch
        * `dinner` - Dinner
        * `snack` - Snack
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        title:
          type: string
          maxLength: 255
        message:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - message
      - title
    NotificationTypeEnum:
      enum:
      - expiry
      - donation
      - meal
      - system
      type: string
      description: |-
        * `expiry` - Expiry Alert
        * `donation` - Donation Update
        * `meal` - Meal Reminder
        * `system` - System Message
    PatchedDonationRequest:
      type: object
      properties:
        food_item:
          type: integer
        description:
          type: string
        pickup_info:
          type: string
          minLength: 1
    PatchedFoodItemRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          minLength: 1
          maxLength: 50
        category:
          $ref: '#/components/schemas/CategoryEnum'
        storage_location:
          $ref: '#/components/schemas/StorageLocationEnum'
        expiry_date:
          type: string
          format: date
        notes:
          type: string
    PatchedMealPlanRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        meal_type:
          $ref: '#/components/schemas/MealTypeEnum'
        meal_name:
          type: string
          minLength: 1
          maxLength: 255
        notes:
          type: string
    PatchedNotificationRequest:
      type: object
      properties:
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        title:
          type: string
          minLength: 1
          maxLength: 255
        message:
          type: string
          minLength: 1
        is_read:
          type: boolean
    PatchedUserRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        phone_number:
          type: string
          maxLength: 20
        household_size:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_2fa_enabled:
          type: boolean
        is_donations_public:
          type: boolean
        email_notifications:
          type: boolean
        push_notifications:
          type: boolean
    RegisterRequest:
